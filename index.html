<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- tailwindcss and daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="geist bg-[#F8FAFC]">
    <div class="flex items-center justify-center min-h-screen">
      <fieldset
        class="fieldset bg-white border-base-300 rounded-box w-sm border p-4"
      >
        <div class="flex flex-col items-center gap-2 mb-4">
          <img src="./assets/github-logo.png" alt="" />
          <h1 class="text-[#1F2937] font-semibold text-2xl">
            GitHub Issues Tracker
          </h1>
          <p class="text-[#64748B] text-md">Sign in to manage your issues</p>
        </div>

        <label class="label">Username</label>
        <input
          id="user-name"
          type="text"
          class="input w-full"
          placeholder="Enter Username"
        />

        <label class="label">Password</label>
        <input
          id="password"
          type="password"
          class="input w-full"
          placeholder="Password"
        />

        <button onclick="login()" class="btn btn-primary mt-4">Sign In</button>

        <div class="flex items-center my-4">
          <hr class="flex-1 border-gray-300" />
          <span class="px-2">OR</span>
          <hr class="flex-1 border-gray-300" />
        </div>

        <h4 class="text-[#64748B] text-center text-md">Demo Credentials:</h4>

        <div class="text-center bg-[#F8FAFC] p-4 rounded-lg">
          <p><span class="font-bold">Username:</span> admin</p>
          <p><span class="font-bold">Password:</span> admin123</p>
        </div>
      </fieldset>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
